services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REFRESH_TOKEN: ${SPOTIFY_REFRESH_TOKEN:-}
      GITHUB_USERNAME: ${GITHUB_USERNAME:-ErickCReis}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      UPTIMEROBOT_API_KEY: ${UPTIMEROBOT_API_KEY:-}
      UPTIMEROBOT_MONITOR_ID: ${UPTIMEROBOT_MONITOR_ID:-}
      CODEX_SYNC_TOKEN: ${CODEX_SYNC_TOKEN:-}
      CODEX_STALE_AFTER_MINUTES: ${CODEX_STALE_AFTER_MINUTES:-180}
      DATA_DIR: ${DATA_DIR:-/app/data}
      BATTERY_SUPPLY_ROOT: ${BATTERY_SUPPLY_ROOT:-/host-sys/class/power_supply}
    volumes:
      - ./data:/app/data
      - /sys/class/power_supply:/host-sys/class/power_supply:ro
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    restart: unless-stopped
